<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Claw - Sage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .search-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        #searchInput {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        #searchInput:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .conversations {
            display: grid;
            gap: 20px;
        }
        
        .conversation-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .conversation-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        
        .conversation-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }
        
        .conversation-date {
            color: #999;
            font-size: 0.9em;
        }
        
        .conversation-messages {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 10px;
            max-width: 80%;
        }
        
        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
        }
        
        .assistant-message {
            background: #f0f0f0;
            color: #333;
            margin-right: auto;
        }
        
        .message-sender {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.85em;
        }
        
        .toggle-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: transform 0.2s;
        }
        
        .toggle-button:hover {
            transform: scale(1.05);
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2em;
        }
        
        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Historial de Claw</h1>
            <p class="subtitle">Asistente Personal IA - Sage</p>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalConversations">0</div>
                    <div class="stat-label">Conversaciones</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalMessages">0</div>
                    <div class="stat-label">Mensajes</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalUserMessages">0</div>
                    <div class="stat-label">Tus Mensajes</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalAssistantMessages">0</div>
                    <div class="stat-label">Respuestas Sage</div>
                </div>
            </div>
        </header>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Buscar en conversaciones...">
        </div>
        
        <div id="conversationsContainer" class="conversations">
            <div class="loading">Cargando conversaciones...</div>
        </div>
    </div>
    
    <script>
        let conversationsData = [];
        
        async function loadConversations() {
            try {
                const response = await fetch('claw_data_extracted/conversations.json');
                conversationsData = await response.json();
                displayConversations(conversationsData);
                updateStats(conversationsData);
            } catch (error) {
                document.getElementById('conversationsContainer').innerHTML = 
                    '<div class="error">Error al cargar las conversaciones: ' + error.message + '</div>';
            }
        }
        
        function displayConversations(conversations) {
            const container = document.getElementById('conversationsContainer');
            container.innerHTML = '';
            
            conversations.forEach((conv, index) => {
                const card = document.createElement('div');
                card.className = 'conversation-card';
                
                const date = new Date(conv.created_at).toLocaleDateString('es-ES', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                const messagesCount = conv.chat_messages ? conv.chat_messages.length : 0;
                
                card.innerHTML = `
                    <div class="conversation-header">
                        <div class="conversation-title">${conv.name || 'Sin título'}</div>
                        <div class="conversation-date">${date}</div>
                    </div>
                    <div class="subtitle">${messagesCount} mensajes</div>
                    <button class="toggle-button" onclick="toggleMessages(${index})">
                        Ver mensajes
                    </button>
                    <div id="messages-${index}" class="conversation-messages hidden">
                        ${renderMessages(conv.chat_messages || [])}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        function renderMessages(messages) {
            if (!messages || messages.length === 0) {
                return '<p style="color: #999; text-align: center; padding: 20px;">No hay mensajes en esta conversación</p>';
            }
            
            return messages.map(msg => {
                const isUser = msg.sender === 'human';
                const senderName = isUser ? '👤 Tú' : '🤖 Sage';
                const messageClass = isUser ? 'user-message' : 'assistant-message';
                
                return `
                    <div class="message ${messageClass}">
                        <div class="message-sender">${senderName}</div>
                        <div class="message-content">${formatMessage(msg.text || msg.content)}</div>
                    </div>
                `;
            }).join('');
        }
        
        function formatMessage(content) {
            if (typeof content === 'string') {
                return content
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/`(.*?)`/g, '<code>$1</code>');
            } else if (Array.isArray(content)) {
                return content.map(item => {
                    if (typeof item === 'string') {
                        return formatMessage(item);
                    } else if (item && item.text) {
                        return formatMessage(item.text);
                    }
                    return '';
                }).join('<br>');
            }
            return '';
        }
        
        function toggleMessages(index) {
            const messagesDiv = document.getElementById(`messages-${index}`);
            const button = messagesDiv.previousElementSibling;
            
            if (messagesDiv.classList.contains('hidden')) {
                messagesDiv.classList.remove('hidden');
                button.textContent = 'Ocultar mensajes';
            } else {
                messagesDiv.classList.add('hidden');
                button.textContent = 'Ver mensajes';
            }
        }
        
        function updateStats(conversations) {
            let totalMessages = 0;
            let totalUserMessages = 0;
            let totalAssistantMessages = 0;
            
            conversations.forEach(conv => {
                if (conv.chat_messages) {
                    conv.chat_messages.forEach(msg => {
                        totalMessages++;
                        if (msg.sender === 'human') {
                            totalUserMessages++;
                        } else if (msg.sender === 'assistant') {
                            totalAssistantMessages++;
                        }
                    });
                }
            });
            
            document.getElementById('totalConversations').textContent = conversations.length;
            document.getElementById('totalMessages').textContent = totalMessages;
            document.getElementById('totalUserMessages').textContent = totalUserMessages;
            document.getElementById('totalAssistantMessages').textContent = totalAssistantMessages;
        }
        
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            
            if (searchTerm === '') {
                displayConversations(conversationsData);
                return;
            }
            
            const filtered = conversationsData.filter(conv => {
                const nameMatch = conv.name && conv.name.toLowerCase().includes(searchTerm);
                const messagesMatch = conv.chat_messages && conv.chat_messages.some(msg => {
                    const text = (msg.text || JSON.stringify(msg.content) || '').toLowerCase();
                    return text.includes(searchTerm);
                });
                return nameMatch || messagesMatch;
            });
            
            displayConversations(filtered);
        });
        
        // Cargar conversaciones al iniciar
        loadConversations();
    </script>
</body>
</html>
